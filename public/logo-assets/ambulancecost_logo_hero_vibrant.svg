<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vibrantHeroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" /> <!-- Vibrant Blue-600 -->
      <stop offset="60%" style="stop-color:#1e40af;stop-opacity:1" /> <!-- Blue-800 -->
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" /> <!-- Indigo-950 (Dark limit) -->
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1600" height="900" fill="url(#vibrantHeroGradient)" />
  
  <!-- Logo Container -->
  <g transform="translate(420, 390)">
    <!-- Icon Square -->
    <rect x="0" y="0" width="120" height="120" rx="30" fill="#3b82f6" /> <!-- Slightly Lighter Icon Square to Pop -->
    
    <!-- Ambulance Silhouette -->
    <g transform="translate(15, 20) scale(4)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 10c0-1.1.9-2 2-2h3l4 4h1a2 2 0 0 1 2 2v5" />
      <path d="M20 19a3 3 0 0 1-6 0" />
      <path d="M10 19a3 3 0 0 1-6 0" />
      <path d="M4 19v-5a2 2 0 0 1 2-2h4v7" />
      <path d="M10 14h10" />
      <circle cx="7" cy="19" r="2" />
      <circle cx="17" cy="19" r="2" />
    </g>
    
    <!-- Company Name -->
    <text x="160" y="85" font-family="sans-serif" font-weight="900" font-size="96" letter-spacing="-0.02em">
      <tspan fill="white">Ambulance</tspan><tspan fill="#93c5fd">Cost</tspan> <!-- blue-300 for 'Cost' to pop more -->
    </text>
  </g>
</svg>
